		<style>
			body[adapt='pc']>* {
				display: none !important;
			}

			body[adapt='pc']>uni-adapt-pc {
				display: block !important;
			}

			body[adapt='pc'] {
				margin: 0;
				background-color: #fff;
				width: 100vw;
				height: 100vh;
				overflow: hidden;
			}

			body[adapt='pc'] uni-adapt-pc .container {
				position: fixed;
				width: 750px;
				height: 100%;
				z-index: 1;
				top: 0;
				right: 0;
				bottom: 0;
				left: 0;
				margin: auto;
				box-sizing: border-box;
				border: 1px solid rgba(0, 0, 0, 0.06);
				box-shadow:
					0 4px 24px rgba(0, 0, 0, 0.06),
					0 1px 2px rgba(0, 0, 0, 0.04);
			}

			body[adapt='pc'] uni-adapt-pc iframe {
				width: 100%;
				height: 100%;
				border: none;
			}

			/* Loading Mask */
			#app-network-loading-mask {
				position: fixed;
				inset: 0;
				z-index: 999991;
				background: rgba(255, 255, 255, 0.9);
				display: flex;
				align-items: center;
				justify-content: center;
				transition: opacity 0.3s ease-out;
			}

			#app-network-loading-mask.fade-out {
				opacity: 0;
				pointer-events: none;
			}

			.app-loading-chase {
				width: 40px;
				height: 40px;
				position: relative;
				animation: app-loading-chase 2.5s infinite linear both;
			}

			.app-loading-chase-dot {
				width: 100%;
				height: 100%;
				position: absolute;
				left: 0;
				top: 0;
				animation: app-loading-chase-dot 2s infinite ease-in-out both;
			}

			.app-loading-chase-dot::before {
				content: '';
				display: block;
				width: 25%;
				height: 25%;
				background-color: #00bebe;
				border-radius: 50%;
				animation: app-loading-chase-dot-before 2s infinite ease-in-out both;
			}

			.app-loading-chase-dot:nth-child(1),
			.app-loading-chase-dot:nth-child(1)::before {
				animation-delay: -1.1s;
			}

			.app-loading-chase-dot:nth-child(2),
			.app-loading-chase-dot:nth-child(2)::before {
				animation-delay: -1s;
			}

			.app-loading-chase-dot:nth-child(3),
			.app-loading-chase-dot:nth-child(3)::before {
				animation-delay: -0.9s;
			}

			.app-loading-chase-dot:nth-child(4),
			.app-loading-chase-dot:nth-child(4)::before {
				animation-delay: -0.8s;
			}

			.app-loading-chase-dot:nth-child(5),
			.app-loading-chase-dot:nth-child(5)::before {
				animation-delay: -0.7s;
			}

			.app-loading-chase-dot:nth-child(6),
			.app-loading-chase-dot:nth-child(6)::before {
				animation-delay: -0.6s;
			}

			@keyframes app-loading-chase {
				100% {
					transform: rotate(360deg);
				}
			}

			@keyframes app-loading-chase-dot {

				80%,
				100% {
					transform: rotate(360deg);
				}
			}

			@keyframes app-loading-chase-dot-before {

				0%,
				100% {
					transform: scale(1);
				}

				50% {
					transform: scale(0.4);
				}
			}
		</style>
		<title>many-fish-app</title>
		<!--preload-links-->
		<!--app-context-->
	</head>

	<body>
		<div id="app"><!--app-html--></div>
		<uni-adapt-pc></uni-adapt-pc>
		<script>
			;
			(function() {
				if (window.innerWidth <= 750) return
				var container = document.createElement('div')
				container.className = 'container'
				var iframe = document.createElement('iframe')
				iframe.src = window.location.href
				container.appendChild(iframe)
				var adaptEl = document.querySelector('uni-adapt-pc')
				if (adaptEl) {
					adaptEl.appendChild(container)
					document.body.setAttribute('adapt', 'pc')
				}
			})();
			(function() {
				var chase = document.createElement('div')
				chase.className = 'app-loading-chase'
				for (var i = 0; i < 6; i++) {
					var dot = document.createElement('div')
					dot.className = 'app-loading-chase-dot'
					chase.appendChild(dot)
				}
				var mask = document.createElement('div')
				mask.id = 'app-network-loading-mask'
				mask.appendChild(chase)
				document.body.appendChild(mask)

				window.addEventListener('many-fish-app-ready', function() {
					mask.classList.add('fade-out')
					mask.addEventListener('transitionend', function() {
						mask.parentNode && mask.parentNode.removeChild(mask)
					})
				})
			})()
		</script>
		<script type="module" src="/main.js" onload="window.dispatchEvent(new Event('many-fish-app-ready'))"></script>
	</body>
</html>
